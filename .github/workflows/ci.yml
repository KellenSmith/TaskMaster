name: CI

on:
  workflow_dispatch:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  type-check:
    runs-on: ubuntu-latest
    name: Type Check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma-generate
      - run: pnpm tsc --noEmit

  test:
    runs-on: ubuntu-latest
    name: Test with Coverage
    steps:
      - uses: actions/checkout@v4
      # - uses: pnpm/action-setup@v2
      #   with:
      #     version: 10.17.1
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version-file: package.json
      #     cache: pnpm
      # - run: pnpm install --frozen-lockfile
      # - run: pnpm prisma-generate
      # - run: pnpm test:coverage
      # - name: Upload coverage reports
      #   uses: codecov/codecov-action@v3
      #   with:
      #     files: ./coverage/coverage-final.json
      #     flags: unittests
      #     name: codecov-umbrella
      #     fail_ci_if_error: false
  set-global-vars:
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BRANCH: ${{ github.head_ref || github.ref_name }}
        EVENT: ${{ github.event_name }}
    outputs:
      vercel_target: ${{ steps.set-vars.outputs.vercel_target }}
      customer_environments: ${{ steps.set-vars.outputs.customer_environments }}
    steps:
      - uses: actions/checkout@v3
      - id: check-pr
        name: Check for open PR to dev
        run: |
          # Only check for PR if not master or dev branch
          if [[ "$BRANCH" != "master" && "$BRANCH" != "dev" ]]; then
            PR_COUNT=$(gh pr list --base dev --head "$BRANCH" --state open --json number --jq 'length')
            if [[ "$PR_COUNT" -eq 0 ]]; then
              echo "No open PR from $BRANCH to dev. Skipping workflow."
              exit 78
            fi
          fi
      - id: set-vars
        name: Set global vars, Vercel target, and customer environments
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          # Default to preview
          VERCEL_TARGET="preview"
          # If master branch and not a pull_request, set to production
          if [[ "$BRANCH" == "master" && "$EVENT" != "pull_request" ]]; then
            VERCEL_TARGET="production"
          fi
          echo "vercel_target=$VERCEL_TARGET" >> $GITHUB_OUTPUT
          echo 'customer_environments=["demo", "proteus"]' >> $GITHUB_OUTPUT
  set-up-customer-project:
    needs: set-global-vars
    runs-on: ubuntu-latest
    strategy:
      matrix:
        customer_environment: ${{ fromJson(needs.set-global-vars.outputs.customer_environments) }}
    environment: ${{ matrix.customer_environment }}
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/install_deploy_tools
      - uses: ./.github/actions/decode_vars_to_file
        with:
          CUSTOMER_VARS_B64: ${{ secrets.CUSTOMER_VARS }}
      - name: Set up customer project and github link
        run: bash .github/scripts/set_up_customer_project.sh
  set-customer-env-vars:
    needs: [set-global-vars, set-up-customer-project]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        customer_environment: ${{ fromJson(needs.set-global-vars.outputs.customer_environments) }}
    environment: ${{ matrix.customer_environment }}
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/install_deploy_tools
      - uses: ./.github/actions/decode_vars_to_file
        with:
          CUSTOMER_VARS_B64: ${{ secrets.CUSTOMER_VARS }}
      - name: Find preview or production common vars
        run: |
          VERCEL_TARGET="${{ needs.set-global-vars.outputs.vercel_target }}"
          COMMON_VARS_B64='${{ secrets.PREVIEW_VARS }}'
          # If master branch and not a pull_request, set to production
          if [[ "$VERCEL_TARGET" == "production" ]]; then
            COMMON_VARS_B64='${{ secrets.PRODUCTION_VARS }}'
          fi
      - uses: ./.github/actions/decode_vars_to_file
        with:
          CUSTOMER_VARS_B64: "$COMMON_VARS_B64"
          FILE_PATH: common_vars.json
      - name: Set up customer environment variables
        run: |
          bash .github/scripts/set_customer_env_vars.sh "$VERCEL_TARGET"
  provision-customer-rdb:
    needs: [set-global-vars, set-up-customer-project]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        customer_environment: ${{ fromJson(needs.set-global-vars.outputs.customer_environments) }}
    environment: ${{ matrix.customer_environment }}
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/install_deploy_tools
      - uses: ./.github/actions/decode_vars_to_file
        with:
            CUSTOMER_VARS_B64: ${{ secrets.CUSTOMER_VARS }}
      - name: Deploy to customer environment
        run: |
          bash .github/scripts/provision_customer_rdb.sh "${{ needs.set-global-vars.outputs.vercel_target }}"
  provision-customer-blob:
    needs: [set-global-vars, set-up-customer-project]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        customer_environment: ${{ fromJson(needs.set-global-vars.outputs.customer_environments) }}
    environment: ${{ matrix.customer_environment }}
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/install_deploy_tools
      - uses: ./.github/actions/decode_vars_to_file
        with:
            CUSTOMER_VARS_B64: ${{ secrets.CUSTOMER_VARS }}
      - name: Deploy to customer environment
        run: |
          bash .github/scripts/provision_customer_blob.sh "${{ needs.set-global-vars.outputs.vercel_target }}"
  deploy-to-customer-env:
    needs: [set-global-vars, set-up-customer-project, set-customer-env-vars, provision-customer-rdb, provision-customer-blob]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        customer_environment: ${{ fromJson(needs.set-global-vars.outputs.customer_environments) }}
    environment: ${{ matrix.customer_environment }}
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/install_deploy_tools
      - uses: ./.github/actions/decode_vars_to_file
        with:
            CUSTOMER_VARS_B64: ${{ secrets.CUSTOMER_VARS }}
      - name: Deploy to customer environment
        run: |
          bash .github/scripts/deploy_to_customer_env.sh "${{ needs.set-global-vars.outputs.vercel_target }}"
